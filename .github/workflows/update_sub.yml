name: Daily Fetch Nodes

on:
  schedule:
    # 每天国际标准时间 (UTC) 20:00 运行一次，对应北京时间凌晨 4:00
    - cron: '0 20 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行

permissions:
  contents: write # 赋予工作流向仓库提交代码的权限

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run script
      env:
        UUID: ${{ secrets.UUID }}
        SOURCES: ${{ secrets.SOURCES }}
      run: |
        python fetch_nodes.py

    - name: Deploy to GitHub Pages Branch
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./output
        publish_branch: gh-pages # 将结果推送到 gh-pages 分支
